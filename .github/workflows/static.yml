name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            **/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Network check
        run: |
          echo "Checking network connectivity..."
          ping -c 3 google.com
          echo "Checking external document server..."
          curl -I http://116.204.83.177:8028 || echo "External server not reachable, continuing build..."

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          pnpm install --frozen-lockfile --verbose
        continue-on-error: false

      - name: Build
        run: |
          echo "Building project..."
          echo "Current directory: $(pwd)"
          echo "Node version: $(node -v)"
          echo "pnpm version: $(pnpm -v)"
          echo "Starting build..."
          set -x
          pnpm docs:build 2>&1 | tee build.log
          set +x
          echo "Build completed with exit code: $?"
          echo "Build log tail:"
          tail -50 build.log
        env:
          NODE_OPTIONS: --max_old_space_size=8192
          VITEPRESS_EXTERNAL_MD_TIMEOUT: 60000
          DEBUG: vitepress:*
        continue-on-error: false
        timeout-minutes: 30

      - name: Verify build output
        run: |
          if [ ! -d "docs/.vitepress/dist" ]; then
            echo "Build output directory not found!"
            exit 1
          fi
          if [ ! -f "docs/.vitepress/dist/index.html" ]; then
            echo "Index.html not found in build output!"
            exit 1
          fi
          echo "Build verification passed!"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-deployment:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Verify deployment
        run: |
          # 由于部署 URL 是在 deploy 任务中生成的，我们需要使用正确的引用方式
          # 这里直接使用 GitHub Pages 的默认 URL 格式
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          DEPLOY_URL="https://${{ github.repository_owner }}.github.io/$REPO_NAME/"
          echo "Verifying deployment at: $DEPLOY_URL"
          curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL" | grep -E '^20[0-9]$' || {
            echo "Deployment verification failed"
            exit 1
          }
          echo "Deployment verification passed!"