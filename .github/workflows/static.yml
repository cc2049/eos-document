name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需要获取所有历史记录来确保构建正确

      # 1. 先安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # 或者 latest

      # 2. 再安装 Node.js (并自动配置缓存)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm # 这里会自动缓存 pnpm 的依赖

      # 3. 安装依赖
      - name: Install dependencies
        run: pnpm install

      # 4. 构建项目
      - name: Build
        run: pnpm docs:build
        env:
          # 👇 增加这一行，将内存限制提高到 4GB
          NODE_OPTIONS: --max_old_space_size=4096

      # 5. 上传构件 (关键：确保路径正确)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ⚠️ 请根据你的实际项目结构调整这里
          # 如果是标准 VitePress 项目，通常是下面这个路径
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4