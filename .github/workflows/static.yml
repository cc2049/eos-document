name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 安装 Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm # 👈 开启 pnpm 缓存

      # 2. 【新增步骤】安装 pnpm 工具本身
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest # 自动安装最新版 pnpm

      - name: Install dependencies
        run: pnpm install # 👈 使用 pnpm 安装依赖

      - name: Build
        run: pnpm run build # 👈 使用 pnpm 运行构建

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist # 👈 确认你的构建输出目录