version: '1.0'
name: vitepress-deploy
displayName: VitePress 文档构建
stages:
  - stage:
    name: compile
    displayName: 编译
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 14.16.0
        commands:
          - npm install -g pnpm@8
          - pnpm install
          - pnpm run build
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./docs/.vitepress/dist
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        dependsOn: build_nodejs
triggers:
  push:
    branches:
      include:
        - master
